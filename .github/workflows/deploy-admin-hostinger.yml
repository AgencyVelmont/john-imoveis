name: Deploy Admin to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "admin/**"
      - ".github/workflows/deploy-admin-hostinger.yml"

jobs:
  deploy-admin:
    name: Build and deploy admin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build admin
        working-directory: admin
        run: npm run build

      - name: Deploy admin files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: admin/dist/
          server-dir: /domains/felipecorretor.com.br/public_html/admin/
          state-name: .ftp-deploy-sync-state-admin-domain-public-html.json
          exclude: |
            **/.git*
            **/.git*/**
            api/**
            api/**/*
            uploads/**
            uploads/**/*

      - name: Deploy admin API files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: admin/public/api/
          server-dir: /domains/felipecorretor.com.br/public_html/api/
          state-name: .ftp-deploy-sync-state-api-domain-public-html.json
          exclude: |
            **/.git*
            **/.git*/**
            .htaccess
            .htaccess*
            **/.htaccess
            **/.htaccess*
            uploads/**
            uploads/**/*

      - name: Verify deployed upload flow
        run: |
          api_status="$(curl -sS -o /dev/null -w "%{http_code}" -X OPTIONS \
            -H "Origin: https://admin.felipecorretor.com.br" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: Authorization, Content-Type" \
            https://felipecorretor.com.br/api/upload-imovel.php)"
          test "$api_status" = "204"

          admin_html="$(curl -fsSL https://admin.felipecorretor.com.br/)"
          main_asset="$(printf "%s" "$admin_html" | grep -o 'assets/index-[^"]*\.js' | head -n 1)"
          test -n "$main_asset"

          main_js="$(curl -fsSL "https://admin.felipecorretor.com.br/$main_asset")"
          property_asset="$(printf "%s" "$main_js" | grep -o 'assets/property-images-[^"]*\.js' | head -n 1)"
          test -n "$property_asset"

          property_js="$(curl -fsSL "https://admin.felipecorretor.com.br/$property_asset")"
          printf "%s" "$property_js" | grep -q "upload-imovel.php"
          ! printf "%s" "$property_js" | grep -q "storage.from"
