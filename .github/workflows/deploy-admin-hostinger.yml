name: Deploy Admin to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - "admin/**"
      - ".github/workflows/deploy-admin-hostinger.yml"

jobs:
  deploy-admin:
    name: Build and deploy admin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build admin
        working-directory: admin
        run: npm run build

      - name: Verify API build output
        run: ls -la admin/dist/api

      - name: Deploy admin files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: admin/dist/
          server-dir: /admin/
          exclude: |
            **/.git*
            **/.git*/**
            api/**
            api/**/*
            uploads/**
            uploads/**/*

      - name: Install FTP state reset tool
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Reset API FTP deploy state
        env:
          FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<'LFTP'
          set ssl:verify-certificate no
          cd /api
          rm -f .ftp-deploy-sync-state-api.json
          bye
          LFTP

      - name: Deploy admin API files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: admin/dist/api/
          server-dir: /api/
          state-name: .ftp-deploy-sync-state-api.json
          exclude: |
            **/.git*
            **/.git*/**
            .htaccess
            .htaccess*
            **/.htaccess
            **/.htaccess*
            uploads/**
            uploads/**/*
