name: Validate John Andrade Frontends

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            public/package-lock.json
            admin/package-lock.json

      - name: Install public dependencies
        working-directory: public
        run: npm ci

      - name: Lint public
        working-directory: public
        run: npm run lint

      - name: Build public
        working-directory: public
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_ADMIN_URL: ${{ secrets.VITE_ADMIN_URL }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Lint admin
        working-directory: admin
        run: npm run lint

      - name: Build admin
        working-directory: admin
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_ADMIN_URL: ${{ secrets.VITE_ADMIN_URL }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Verify build artifacts
        run: |
          test -f public/dist/index.html
          test -f admin/dist/index.html
          test -f admin/dist/sw.js
