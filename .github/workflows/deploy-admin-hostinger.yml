name: Deploy John Andrade to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Lint root
        run: npm run lint

      - name: Build root
        run: npm run build

      - name: Install public dependencies
        working-directory: public
        run: npm ci

      - name: Lint public
        working-directory: public
        run: npm run lint

      - name: Build public
        working-directory: public
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_ADMIN_URL: ${{ secrets.VITE_ADMIN_URL }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Lint admin
        working-directory: admin
        run: npm run lint

      - name: Build admin
        working-directory: admin
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_ADMIN_URL: ${{ secrets.VITE_ADMIN_URL }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Deploy public site
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT }}
          local-dir: public/dist/
          server-dir: ${{ secrets.HOSTINGER_PUBLIC_PATH }}
          dangerous-clean-slate: false
          exclude: |
            **/.env*
            **/uploads/**

      - name: Deploy admin and PHP API
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT }}
          local-dir: admin/dist/
          server-dir: ${{ secrets.HOSTINGER_ADMIN_PATH }}
          dangerous-clean-slate: false
          exclude: |
            **/.env*
            **/uploads/**
