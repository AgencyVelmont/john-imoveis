name: Deploy Admin to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - "admin/**"
      - ".github/workflows/deploy-admin-hostinger.yml"

jobs:
  deploy-admin:
    name: Build and deploy admin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build admin
        working-directory: admin
        run: npm run build

      - name: Deploy admin files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: admin/dist/
          server-dir: /admin/
          exclude: |
            **/.git*
            **/.git*/**
            api/**
            api/**/*
            uploads/**
            uploads/**/*

      - name: Deploy admin API files
        if: ${{ hashFiles('admin/dist/api/**') != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: admin/dist/api/
          server-dir: /api/
          exclude: |
            **/.git*
            **/.git*/**
            .htaccess
            .htaccess*
            **/.htaccess
            **/.htaccess*
            uploads/**
            uploads/**/*
