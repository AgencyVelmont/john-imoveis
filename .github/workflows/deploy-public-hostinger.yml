name: Deploy Public Site to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "public/**"
      - ".github/workflows/deploy-public-hostinger.yml"

jobs:
  deploy-public:
    name: Build and deploy public site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: public/package-lock.json

      - name: Install dependencies
        working-directory: public
        run: npm ci

      - name: Build public site
        working-directory: public
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Verify public build config
        run: |
          ! grep -R "Configure VITE_SUPABASE_URL" public/dist/assets/*.js

      - name: Deploy public files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: public/dist/
          server-dir: /domains/felipecorretor.com.br/public_html/
          state-name: .ftp-deploy-sync-state-public-domain-public-html.json
          exclude: |
            **/.git*
            **/.git*/**
            admin/**
            admin/**/*
            api/**
            api/**/*
            uploads/**
            uploads/**/*

      - name: Verify deployed public site
        run: |
          public_html="$(curl -fsSL https://felipecorretor.com.br/)"
          main_asset="$(printf "%s" "$public_html" | grep -o 'assets/index-[^"]*\.js' | head -n 1)"
          test -n "$main_asset"

          main_js="$(curl -fsSL "https://felipecorretor.com.br/$main_asset")"
          property_asset="$(printf "%s" "$main_js" | grep -o 'assets/PropertyCard-[^"]*\.js' | head -n 1)"
          test -n "$property_asset"

          property_js="$(curl -fsSL "https://felipecorretor.com.br/$property_asset")"
          printf "%s" "$property_js" | grep -q "suíte"
